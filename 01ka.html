<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>학생용 플래시카드</title>

<style>
body {
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    height:100vh;
    margin:0;
    background:#f0f2f5;
    font-family:sans-serif;
}

.card {
    width:90%;
    max-width:400px;
    height:500px;
    background:white;
    border-radius:20px;
    box-shadow:0 10px 20px rgba(0,0,0,0.1);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    transition:transform .2s;
    text-align:center;
    padding:20px;
    box-sizing:border-box;
}

.card:active { transform:scale(.98); }

img {
    max-width:100%;
    max-height:70%;
    border-radius:10px;
    margin-bottom:20px;
    pointer-events:none;
}

.text {
    font-size:2rem;
    font-weight:bold;
    color:#333;
    min-height:3rem;
}

.hint {
    color:#888;
    margin-top:20px;
    font-size:.9rem;
}

.progress {
    margin-bottom:10px;
    color:#555;
}

button {
    margin-bottom:20px;
    font-size:1rem;
    padding:6px 12px;
}
</style>
</head>

<body>

<button onclick="goMenu()">メニューに戻る</button>

<div class="progress" id="progress">1 / 0</div>

<div class="card" onclick="nextCard()">
    <img id="card-img" src="">
    <div class="text" id="card-text"></div>
    <div class="hint">(画面をクリックすると次のカードに進みます。)</div>
</div>

<script>

// ⭐ audio 경로 추가
const flashcards = [
    { img:"https://raw.githubusercontent.com/wakuseiboy-prog/korean/main/01-1.png", text:"안녕하십니까? 저는 다나카 입니다.", audio:"11-1.mp3" },
    { img:"https://raw.githubusercontent.com/wakuseiboy-prog/korean/main/01-2.png", text:"안녕하세요. 이유진 입니다. 잘 부탁합니다.", audio:"11-2.mp3" },
    { img:"https://raw.githubusercontent.com/wakuseiboy-prog/korean/main/01-3.png", text:"다나카 씨는 대학생 입니까?", audio:"11-3.mp3" },
    { img:"https://raw.githubusercontent.com/wakuseiboy-prog/korean/main/01-4.png", text:"예, 대학생입니다.", audio:"11-4.mp3" }
];

let currentIndex = 0;
let step = 0; // ⭐ 0=이미지, 1=문장, 2=음성

// ⭐ 재사용 Audio 객체 (최고 안정)
const player = new Audio();
player.preload = "auto";

function showQuestion() {
    const card = flashcards[currentIndex];

    document.getElementById('card-img').src = card.img;
    document.getElementById('card-text').innerText = "";
    document.getElementById('progress').innerText =
        `${currentIndex + 1} / ${flashcards.length}`;

    step = 0;

    // ⭐ 다음 음성 미리 로딩
    player.src = card.audio;
}

function showText() {
    const card = flashcards[currentIndex];
    document.getElementById('card-text').innerText = card.text;
}

function playAudio() {
    player.currentTime = 0;
    player.play();
}

function nextCard() {

    if (step === 0) {

        // ⭐ 1 → 문장 표시
        showText();
        step = 1;

    } else if (step === 1) {

        // ⭐ 2 → 음성 재생
        playAudio();
        step = 2;

    } else {

        // ⭐ 3 → 다음 카드
        currentIndex++;
        if (currentIndex >= flashcards.length) currentIndex = 0;

        showQuestion();
    }
}

function goMenu() {
    window.location.href = "index.html";
}

window.onload = showQuestion;

</script>

</body>
</html>
