
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>학생용 플래시카드</title>
    <style>
        body { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background-color: #f0f2f5; font-family: sans-serif; }
        .card { width: 90%; max-width: 400px; height: 500px; background: white; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: transform 0.2s; text-align: center; padding: 20px; box-sizing: border-box; }
        .card:active { transform: scale(0.98); }
        img { max-width: 100%; max-height: 70%; border-radius: 10px; margin-bottom: 20px; pointer-events: none; }
        .text { font-size: 2rem; font-weight: bold; color: #333; min-height: 3rem; }
        .hint { color: #888; margin-top: 20px; font-size: 0.9rem; }
        .progress { margin-bottom: 10px; color: #555; }
    </style>
</head>
<body>
<!-- 메뉴로 돌아가기 버튼 추가 -->
    <button onclick="goMenu()" style="margin-bottom:20px; font-size:1rem; padding:5px 10px;">
        メニューに戻る
    </button>
    <div class="progress" id="progress">1 / 0</div>
    
    <div class="card" onclick="nextCard()">
        <img id="card-img" src="" alt="이미지">
        <div class="text" id="card-text"></div>
        <div class="hint">(画面をクリックすると次のカードに進みます。)</div>
    </div>

<script>
const flashcards = [
    { img: "https://raw.githubusercontent.com/wakuseiboy-prog/korean/main/v01.png", text: "귀" },
    { img: "https://raw.githubusercontent.com/wakuseiboy-prog/korean/main/v02.png", text: "사과" },
    { img: "https://raw.githubusercontent.com/wakuseiboy-prog/korean/main/v03.png", text: "메뉴" },
    { img: "https://raw.githubusercontent.com/wakuseiboy-prog/korean/main/v04.png", text: "의자" },
    { img: "https://raw.githubusercontent.com/wakuseiboy-prog/korean/main/v05.png", text: "돼지" },
    { img: "https://raw.githubusercontent.com/wakuseiboy-prog/korean/main/v06.png", text: "와이" },
    { img: "https://raw.githubusercontent.com/wakuseiboy-prog/korean/main/v07.png", text: "스위스" },
    { img: "https://raw.githubusercontent.com/wakuseiboy-prog/korean/main/v08.png", text: "의사" },
    { img: "https://raw.githubusercontent.com/wakuseiboy-prog/korean/main/v09.png", text: "샤워" },
    { img: "https://raw.githubusercontent.com/wakuseiboy-prog/korean/main/v10.png", text: "하와이" },
    { img: "https://raw.githubusercontent.com/wakuseiboy-prog/korean/main/v11.png", text: "스타워즈" },
    { img: "https://raw.githubusercontent.com/wakuseiboy-prog/korean/main/v12.png", text: "왜" },
    { img: "https://raw.githubusercontent.com/wakuseiboy-prog/korean/main/v13.png", text: "레고" },
    { img: "https://raw.githubusercontent.com/wakuseiboy-prog/korean/main/v14.png", text: "시계" },
    { img: "https://raw.githubusercontent.com/wakuseiboy-prog/korean/main/v15.png", text: "로프웨이" }
 
];

let currentIndex = 0;
let showingAnswer = false; // ⭐ 상태 추가

function showQuestion() {
    const card = flashcards[currentIndex];
    document.getElementById('card-img').src = card.img;
    document.getElementById('card-text').innerText = ""; // 글자 숨김
    document.getElementById('progress').innerText = `${currentIndex + 1} / ${flashcards.length}`;
}

function showAnswer() {
    const card = flashcards[currentIndex];
    document.getElementById('card-text').innerText = card.text;
    speak(card.text);
}

function speak(msg) {
    window.speechSynthesis.cancel();
    const utterance = new SpeechSynthesisUtterance(msg);
    utterance.lang = 'ko-KR';
    utterance.rate = 0.6;
    window.speechSynthesis.speak(utterance);
}

function goMenu() {
    window.location.href = "index.html";
}

function speak(msg) {
    window.speechSynthesis.cancel();

    // 0.5초(500ms) 지연 후에 발음 시작
    setTimeout(() => {
        const utterance = new SpeechSynthesisUtterance(msg);
        utterance.lang = 'ko-KR';
        utterance.rate = 0.6;   // 속도 조절
        window.speechSynthesis.speak(utterance);
    }, 500); // 500ms = 0.5초
}

    
    
function nextCard() {
    if (!showingAnswer) {
        // ⭐ 첫 클릭 → 정답 표시
        showAnswer();
        showingAnswer = true;
    } else {
        // ⭐ 두 번째 클릭 → 다음 카드
        currentIndex++;
        if (currentIndex >= flashcards.length) currentIndex = 0;
        
        showingAnswer = false;
        showQuestion();
    }
}

window.onload = () => {
    showQuestion(); // ⭐ 처음엔 사진만 표시
};
</script>

    
</body>
</html>
