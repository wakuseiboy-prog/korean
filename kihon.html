<meta charset="UTF-8">

<title>한국어 암기카드</title>

<style>
body {
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    height:100vh;
    margin:0;
    background:#f0f2f5;
    font-family:sans-serif;
}

.card {
    width:90%;
    max-width:400px;
    height:500px;
    background:white;
    border-radius:20px;
    box-shadow:0 10px 20px rgba(0,0,0,0.1);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    transition:transform .2s;
    text-align:center;
    padding:20px;
}

.card:active { transform:scale(.98); }

img {
    max-width:100%;
    max-height:65%;
    border-radius:10px;
    margin-top:15px;
    display:none; /* 처음엔 숨김 */
}

.text {
    font-size:2.3rem;
    font-weight:bold;
    color:#333;
    min-height:3rem;
    display:none; /* 처음엔 숨김 */
}

.hint {
    color:#888;
    margin-top:20px;
    font-size:.9rem;
}

.progress { margin-bottom:10px; color:#555; }
</style>
</head>

<body>

<button onclick="goMenu()" style="margin-bottom:20px;font-size:1rem;padding:5px 10px;">

</button>
