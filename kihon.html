<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>한국어 암기카드</title>

<style>
body {
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    height:100vh;
    margin:0;
    background:#f0f2f5;
    font-family:sans-serif;
}

.card {
    width:90%;
    max-width:400px;
    height:500px;
    background:white;
    border-radius:20px;
    box-shadow:0 10px 20px rgba(0,0,0,0.1);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    transition:transform .2s;
    text-align:center;
    padding:20px;
}

.card:active { transform:scale(.98); }

img {
    max-width:100%;
    max-height:65%;
    border-radius:10px;
    margin-top:15px;
    display:none;
}

.text {
    font-size:2.3rem;
    font-weight:bold;
    color:#333;
    min-height:3rem;
}

.hint {
    color:#888;
    margin-top:20px;
    font-size:.9rem;
}

.progress { margin-bottom:10px; color:#555; }
</style>
</head>

<body>

<button onclick="goMenu()" style="margin-bottom:20px;font-size:1rem;padding:5px 10px;">
メニューに戻る
</button>

<div class="progress" id="progress"></div>

<div class="card" onclick="nextCard()">
    <div class="text" id="card-text"></div>
    <img id="card-img" src="">
    <div class="hint">(画面をクリックすると次へ)</div>
</div>

<script>

const flashcards = [
 { img:"https://raw.githubusercontent.com/wakuseiboy-prog/korean/main/kihon01.png", text:"하마", audio:"kihon01.mp3" },
 { img:"https://raw.githubusercontent.com/wakuseiboy-prog/korean/main/kihon02.png", text:"다리", audio:"kihon02.mp3" },
 { img:"https://raw.githubusercontent.com/wakuseiboy-prog/korean/main/kihon03.png", text:"포도", audio:"kihon03.mp3" },
 { img:"https://raw.githubusercontent.com/wakuseiboy-prog/korean/main/kihon04.png", text:"버스", audio:"kihon04.mp3" },
 { img:"https://raw.githubusercontent.com/wakuseiboy-prog/korean/main/kihon05.png", text:"오이", audio:"kihon05.mp3" },
 { img:"https://raw.githubusercontent.com/wakuseiboy-prog/korean/main/kihon06.png", text:"바다", audio:"kihon06.mp3" },
 { img:"https://raw.githubusercontent.com/wakuseiboy-prog/korean/main/kihon07.png", text:"기타", audio:"kihon07.mp3" },
 { img:"https://raw.githubusercontent.com/wakuseiboy-prog/korean/main/kihon08.png", text:"야구", audio:"kihon08.mp3" },
 { img:"https://raw.githubusercontent.com/wakuseiboy-prog/korean/main/kihon09.png", text:"치마", audio:"kkihon09.mp3" },
 { img:"https://raw.githubusercontent.com/wakuseiboy-prog/korean/main/kihon10.png", text:"피자", audio:"kihon10.mp3" },
 { img:"https://raw.githubusercontent.com/wakuseiboy-prog/korean/main/kihon11.png", text:"구두", audio:"kihon11.mp3" },
 { img:"https://raw.githubusercontent.com/wakuseiboy-prog/korean/main/kihon12.png", text:"쿠키", audio:"kihon12.mp3" },
 { img:"https://raw.githubusercontent.com/wakuseiboy-prog/korean/main/kihon13.png", text:"두부", audio:"kihon13.mp3" },
 { img:"https://raw.githubusercontent.com/wakuseiboy-prog/korean/main/kihon14.png", text:"호두", audio:"kihon14.mp3" },
 { img:"https://raw.githubusercontent.com/wakuseiboy-prog/korean/main/kihon15.png", text:"나비", audio:"kihon15.mp3" },
 { img:"https://raw.githubusercontent.com/wakuseiboy-prog/korean/main/kihon16.png", text:"티비", audio:"kihon16.mp3" },
 { img:"https://raw.githubusercontent.com/wakuseiboy-prog/korean/main/kihon17.png", text:"파티", audio:"kihon17.mp3" },
 { img:"https://raw.githubusercontent.com/wakuseiboy-prog/korean/main/kihon18.png", text:"기차", audio:"kihon18.mp3" },
 { img:"https://raw.githubusercontent.com/wakuseiboy-prog/korean/main/kihon19.png", text:"사자", audio:"kkihon19.mp3" },
 { img:"https://raw.githubusercontent.com/wakuseiboy-prog/korean/main/kihon20.png", text:"고기", audio:"kihon20.mp3" },
 { img:"https://raw.githubusercontent.com/wakuseiboy-prog/korean/main/kihon21.png", text:"오리", audio:"kihon21.mp3" },
 { img:"https://raw.githubusercontent.com/wakuseiboy-prog/korean/main/kihon22.png", text:"치마", audio:"kihon22.mp3" },
 { img:"https://raw.githubusercontent.com/wakuseiboy-prog/korean/main/kihon23.png", text:"지도", audio:"kihon23.mp3" },
 { img:"https://raw.githubusercontent.com/wakuseiboy-prog/korean/main/kihon24.png", text:"이야기", audio:"kihon24.mp3" },
 { img:"https://raw.githubusercontent.com/wakuseiboy-prog/korean/main/kihon25.png", text:"보다", audio:"kihon25.mp3" },
 { img:"https://raw.githubusercontent.com/wakuseiboy-prog/korean/main/kihon26.png", text:"비", audio:"kihon26.mp3" },
 { img:"https://raw.githubusercontent.com/wakuseiboy-prog/korean/main/kihon27.png", text:"가다", audio:"kihon27.mp3" },
 { img:"https://raw.githubusercontent.com/wakuseiboy-prog/korean/main/kihon28.png", text:"오다", audio:"kihon28.mp3" },
  
];

let index = 0;
let step = 0;
let audio = new Audio();

function showText() {
    const c = flashcards[index];
    document.getElementById("card-text").innerText = c.text;
    document.getElementById("card-img").style.display = "none";
    updateProgress();
    step = 0;
}

function showImage() {
    const c = flashcards[index];
    const img = document.getElementById("card-img");
    img.src = c.img;
    img.style.display = "block";
}

function playAudio() {
    audio.pause();
    audio = new Audio(flashcards[index].audio);
    audio.play().catch(()=>{});
}

function nextCard() {

    if (step === 0) {
        // 문자 → 이미지
        showImage();
        step = 1;

    } else if (step === 1) {
        // 이미지 → 음성
        playAudio();
        step = 2;

    } else {
        // 다음 카드
        index++;
        if (index >= flashcards.length) index = 0;
        showText();
    }
}

function updateProgress() {
    document.getElementById("progress").innerText =
        `${index + 1} / ${flashcards.length}`;
}

function goMenu() {
    window.location.href = "index.html";
}

window.onload = showText;

</script>

</body>
</html>
