<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>한국어 암기카드</title>

<style>
body {
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    height:100vh;
    margin:0;
    background:#f0f2f5;
    font-family:sans-serif;
}

.card {
    width:90%;
    max-width:400px;
    height:500px;
    background:white;
    border-radius:20px;
    box-shadow:0 10px 20px rgba(0,0,0,0.1);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    text-align:center;
    padding:20px;
}

img {
    max-width:100%;
    max-height:65%;
    border-radius:10px;
    margin-bottom:15px;
}

.text {
    font-size:2.3rem;
    font-weight:bold;
    color:#333;
    min-height:3rem;
}

.progress { margin-bottom:10px; color:#555; }

.hint {
    color:#888;
    margin-top:20px;
    font-size:.9rem;
}
</style>
</head>

<body>

<button onclick="goMenu()" style="margin-bottom:20px;font-size:1rem;padding:5px 10px;">
メニューに戻る
</button>

<div class="progress" id="progress"></div>

<div class="card" onclick="nextStep()">
    <img id="card-img">
    <div class="text" id="card-text"></div>
    <div class="hint">(画面をクリックすると次へ)</div>
</div>

<script>

const flashcards = [
 { img:"https://raw.githubusercontent.com/wakuseiboy-prog/korean/main/kihon01.png", text:"하마", audio:"kihon01.mp3" },
 { img:"https://raw.githubusercontent.com/wakuseiboy-prog/korean/main/kihon02.png", text:"다리", audio:"kihon02.mp3" },
 { img:"https://raw.githubusercontent.com/wakuseiboy-prog/korean/main/kihon03.png", text:"포도", audio:"kihon03.mp3" },
 { img:"https://raw.githubusercontent.com/wakuseiboy-prog/korean/main/kihon04.png", text:"버스", audio:"kihon04.mp3" },
 { img:"https://raw.githubusercontent.com/wakuseiboy-prog/korean/main/kihon05.png", text:"오이", audio:"kihon05.mp3" },
 { img:"https://raw.githubusercontent.com/wakuseiboy-prog/korean/main/kihon06.png", text:"바다", audio:"kihon06.mp3" },
 { img:"https://raw.githubusercontent.com/wakuseiboy-prog/korean/main/kihon07.png", text:"기타", audio:"kihon07.mp3" },
 { img:"https://raw.githubusercontent.com/wakuseiboy-prog/korean/main/kihon08.png", text:"야구", audio:"kihon08.mp3" },
 { img:"https://raw.githubusercontent.com/wakuseiboy-prog/korean/main/kihon09.png", text:"치마", audio:"kihon09.mp3" },
 { img:"https://raw.githubusercontent.com/wakuseiboy-prog/korean/main/kihon10.png", text:"구두", audio:"kihon10.mp3" },
 { img:"https://raw.githubusercontent.com/wakuseiboy-prog/korean/main/kihon11.png", text:"피자", audio:"kihon11.mp3" },
 { img:"https://raw.githubusercontent.com/wakuseiboy-prog/korean/main/kihon12.png", text:"쿠키", audio:"kihon12.mp3" },
 { img:"https://raw.githubusercontent.com/wakuseiboy-prog/korean/main/kihon13.png", text:"두부", audio:"kihon13.mp3" },
 { img:"https://raw.githubusercontent.com/wakuseiboy-prog/korean/main/kihon14.png", text:"호두", audio:"kihon14.mp3" },
 { img:"https://raw.githubusercontent.com/wakuseiboy-prog/korean/main/kihon15.png", text:"나비", audio:"kihon15.mp3" },
 { img:"https://raw.githubusercontent.com/wakuseiboy-prog/korean/main/kihon16.png", text:"티비", audio:"kihon16.mp3" },
 { img:"https://raw.githubusercontent.com/wakuseiboy-prog/korean/main/kihon17.png", text:"파티", audio:"kihon17.mp3" },
 { img:"https://raw.githubusercontent.com/wakuseiboy-prog/korean/main/kihon18.png", text:"기차", audio:"kihon18.mp3" },
 { img:"https://raw.githubusercontent.com/wakuseiboy-prog/korean/main/kihon19.png", text:"사자", audio:"kihon19.mp3" },
 { img:"https://raw.githubusercontent.com/wakuseiboy-prog/korean/main/kihon20.png", text:"고기", audio:"kihon20.mp3" }
];

let index = 0;
let step = 0;
let audio = new Audio();

function render() {
    const c = flashcards[index];
    const img = document.getElementById("card-img");
    const text = document.getElementById("card-text");

    img.src = c.img;

    if (step === 0) {
        text.innerText = "";
    } else if (step === 1) {
        text.innerText = c.text;
    } else if (step === 2) {
        audio.pause();
        audio = new Audio(c.audio);
        audio.play().catch(()=>{});
    }

    document.getElementById("progress").innerText =
        `${index + 1} / ${flashcards.length}`;
}

function nextStep() {
    step++;

    if (step > 2) {
        index++;
        if (index >= flashcards.length) index = 0;
        step = 0;
    }

    render();
}

function goMenu() {
    window.location.href = "index.html";
}

window.onload = function() {
    step = 0;
    render();
};

</script>

</body>
</html>
