<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>한국어 암기카드</title>

<style>
body {
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    height:100vh;
    margin:0;
    background:#f0f2f5;
    font-family:sans-serif;
}

.card {
    width:90%;
    max-width:400px;
    height:500px;
    background:white;
    border-radius:20px;
    box-shadow:0 10px 20px rgba(0,0,0,0.1);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    transition:transform .2s;
    text-align:center;
    padding:20px;
}

.card:active { transform:scale(.98); }

img {
    max-width:100%;
    max-height:60%;
    border-radius:10px;
    margin-bottom: 20px;
    display: block; /* 기본적으로 보이게 설정 */
}

.text {
    font-size:2.3rem;
    font-weight:bold;
    color:#333;
    min-height:3.5rem;
    visibility: hidden; /* 영역은 차지하되 보이지 않게 설정 */
}

.hint {
    color:#888;
    margin-top:20px;
    font-size:.9rem;
}

.progress { margin-bottom:10px; color:#555; }

button {
    margin-bottom:20px;
    font-size:1rem;
    padding:10px 20px;
    cursor: pointer;
}
</style>
</head>

<body>

<button onclick="goMenu()">
メニューに戻る
</button>

<div class="progress" id="progress">0 / 0</div>

<div class="card" onclick="handleCardClick()">
    <img id="card-img" src="" alt="card image">
    <div class="text" id="card-text"></div>
    <div class="hint" id="card-hint">이미지를 보고 맞춰보세요!</div>
</div>
