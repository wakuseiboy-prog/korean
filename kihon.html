<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>한국어 암기카드</title>

<style>
body {
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    height:100vh;
    margin:0;
    background:#f0f2f5;
    font-family:sans-serif;
}

.card {
    width:90%;
    max-width:400px;
    height:500px;
    background:white;
    border-radius:20px;
    box-shadow:0 10px 20px rgba(0,0,0,0.1);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    text-align:center;
    padding:20px;
}

img {
    max-width:100%;
    max-height:65%;
    border-radius:10px;
    margin-bottom:15px;
}

.text {
    font-size:2.3rem;
    font-weight:bold;
    color:#333;
    min-height:3rem;
}

.progress { margin-bottom:10px; color:#555; }
</style>
</head>

<body>

<div class="progress" id="progress"></div>

<div class="card" onclick="nextStep()">
    <img id="card-img">
    <div class="text" id="card-text"></div>
</div>

<script>

const flashcards = [
 { img:"https://raw.githubusercontent.com/wakuseiboy-prog/korean/main/kihon01.png", text:"하마", audio:"kihon01.mp3" },
 { img:"https://raw.githubusercontent.com/wakuseiboy-prog/korean/main/kihon02.png", text:"다리", audio:"kihon02.mp3" }
];

let index = 0;
let step = 0;
let audio = new Audio();

function render() {
    const c = flashcards[index];
    const img = document.getElementById("card-img");
    const text = document.getElementById("card-text");

    // 항상 이미지 먼저 표시
    img.src = c.img;

    if (step === 0) {
        // 이미지 ONLY
        text.innerText = "";

    } else if (step === 1) {
        // 이미지 + 텍스트
        text.innerText = c.text;

    } else if (step === 2) {
        // 음성 재생
        audio.pause();
        audio = new Audio(c.audio);
        audio.play().catch(()=>{});
    }

    document.getElementById("progress").innerText =
        `${index + 1} / ${flashcards.length}`;
}

function nextStep() {
    step++;

    if (step > 2) {
        // 다음 카드
        index++;
        if (index >= flashcards.length) index = 0;
        step = 0;
    }

    render();
}

window.onload = function() {
    step = 0;
    render(); // ← 무조건 이미지부터 시작
};

</script>

</body>
</html>
