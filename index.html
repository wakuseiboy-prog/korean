<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>학생용 플래시카드</title>
    <style>
        body { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background-color: #f0f2f5; font-family: sans-serif; }
        .card { width: 90%; max-width: 400px; height: 500px; background: white; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: transform 0.2s; text-align: center; padding: 20px; box-sizing: border-box; }
        .card:active { transform: scale(0.98); }
        img { max-width: 100%; max-height: 70%; border-radius: 10px; margin-bottom: 20px; pointer-events: none; }
        .text { font-size: 2rem; font-weight: bold; color: #333; min-height: 3rem; }
        .hint { color: #888; margin-top: 20px; font-size: 0.9rem; }
        .progress { margin-bottom: 10px; color: #555; }
    </style>
</head>
<body>

    <div class="progress" id="progress">1 / 0</div>
    
    <div class="card" onclick="nextCard()">
        <img id="card-img" src="" alt="이미지">
        <div class="text" id="card-text">클릭해서 시작</div>
        <div class="hint">(화면을 클릭하면 다음 카드로 넘어갑니다)</div>
    </div>

    <script>
        // ★ 이 부분을 선생님의 데이터로 수정하세요 ★
        const flashcards = [
            { img: "https://github.com/wakuseiboy-prog/korean/1.jpg", text: “여우" },
            { img: "https://github.com/wakuseiboy-prog/korean/2.jpeg", text: “아이" },
            { img: "https://github.com/wakuseiboy-prog/korean/3.jpg", text: “오이” },
     { img: "https://github.com/wakuseiboy-prog/korean/4.jpeg", text: “이유” },
            { img: "https://github.com/wakuseiboy-prog/korean/5.png", text: “우유" },
            { img: "https://github.com/wakuseiboy-prog/korean/6.png", text: “이” },
     { img: "https://github.com/wakuseiboy-prog/korean/7.png", text: “오” },
            { img: "https://github.com/wakuseiboy-prog/korean/8.jpg", text: “아이" },
            { img: "https://github.com/wakuseiboy-prog/korean/9.jpg", text: “요” },

            // 필요한 만큼 계속 추가하세요 { img: "파일명", text: "단어" }
        ];

        let currentIndex = 0;

        function showCard() {
            const card = flashcards[currentIndex];
            document.getElementById('card-img').src = card.img;
            document.getElementById('card-text').innerText = card.text;
            document.getElementById('progress').innerText = `${currentIndex + 1} / ${flashcards.length}`;
            
            // 한국어 음성(TTS) 재생
            speak(card.text);
        }

        function speak(msg) {
            // 재생 중인 음성 정지
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(msg);
            utterance.lang = 'ko-KR';
            utterance.rate = 1.0; 
            window.speechSynthesis.speak(utterance);
        }

        function nextCard() {
            currentIndex++;
            if (currentIndex >= flashcards.length) {
                currentIndex = 0; // 무한 루프: 마지막이면 처음으로
            }
            showCard();
        }

        // 첫 카드 실행 (사용자 상호작용 후 재생을 권장하므로 처음엔 텍스트만 표시)
        window.onload = () => {
            document.getElementById('progress').innerText = `총 ${flashcards.length}장의 카드가 있습니다`;
        };
    </script>
</body>
</html>
